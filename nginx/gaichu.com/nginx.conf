# Redirect www to non-www (301 permanent)
if ($host = www.gaichu.com) {
    return 301 https://gaichu.com$request_uri;
}

# Bot detection for SEO handlers
set $is_bot "";
if ($http_user_agent ~* "(facebookexternalhit|Twitterbot|Discordbot|Slackbot|LinkedInBot|WhatsApp|TelegramBot|Applebot|Google.*snippet|bingbot|Googlebot|SkypeUriPreview|redditbot|Meta-ExternalAgent)") {
    set $is_bot "1";
}

# Bare /cards and /news — serve SPA, bypass physical directories
location = /cards  { try_files /index.html =404; }
location = /cards/ { try_files /index.html =404; }
location = /news   { try_files /index.html =404; }
location = /news/  { try_files /index.html =404; }

# News: bot → PHP SEO handler, non-bot → SPA
# Negative lookahead excludes .php to avoid rewrite loop and let DreamHost's PHP handler process it
location ~ ^/news/(?!.*\.php)([^/?#]+)/?$ {
    if ($is_bot = "1") {
        rewrite ^/news/([^/?#]+)/?$ /news/index.php?slug=$1 last;
    }
    try_files /index.html =404;
}

# Cards (all sub-paths, excluding .php): bot → PHP SEO handler, non-bot → SPA
location ~ ^/cards/(?!.*\.php).+ {
    if ($is_bot = "1") {
        rewrite ^ /cards/index.php last;
    }
    try_files /index.html =404;
}

# SPA catch-all fallback
location / {
    try_files $uri /index.html;
}
